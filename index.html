<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Liz Princesa 💛</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family: Arial;
  color:white;
}

/* Fondo */
.night{
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at bottom, #020111, #000);
}

/* BOTON INICIO */
.start{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.btn{
  background:#25D366;
  padding:15px 25px;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

/* CONTENIDO */
.content{
  display:none;
}

/* FOTO */
.photo{
  text-align:center;
  margin-top:80px;
}

.photo img{
  width:250px;
  border-radius:20px;
  box-shadow:0 0 25px white;
}

/* FLORES */
.flowers{
  position:absolute;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:40px;
}

.flower{
  width:15px;
  height:0;
  background:green;
  animation:grow 4s forwards;
}

.flower::before{
  content:"🌻";
  position:absolute;
  top:-40px;
  font-size:40px;
}

@keyframes grow{
  to{height:150px;}
}

/* TEXTO */
.texto{
  text-align:center;
  margin-top:20px;
  padding:20px;
  line-height:1.6;
}
</style>

</head>

<body>

<div class="night"></div>

<!-- MUSICA (MEJOR FORMA) -->
<audio id="music">
  <source src="https://files.catbox.moe/8kq7c7.mp3" type="audio/mp3">
</audio>

<!-- INICIO -->
<div class="start" id="start">
  <div class="btn" onclick="startSurprise()">
    💌 Liz Princesa… toca aquí 💛
  </div>
</div>

<!-- CONTENIDO -->
<div class="content" id="content">

  <div class="photo">
    <img src="https://i.postimg.cc/QtXTycc8/Whats-App-Image-2026-03-23-at-10-06-47.jpg">
  </div>

  <div class="texto">
    🌻 Feliz día de las flores amarillas mi amor 💛<br><br>

    Desde que llegaste a mi vida… todo cambió ❤️<br><br>

    Le diste sentido a mis días, alegría a mi mundo  
    y amor a mi corazón 💕<br><br>

    Gracias por existir, por elegirme  
    y por caminar conmigo 🥹<br><br>

    Liz Princesa… te amo muchísimo 💛🌻
  </div>

  <div class="flowers">
    <div class="flower"></div>
    <div class="flower"></div>
    <div class="flower"></div>
  </div>

</div>

<script>
function startSurprise(){
  document.getElementById("start").style.display="none";
  document.getElementById("content").style.display="block";

  // aquí SI funciona la música
  document.getElementById("music").play();
}
</script>

</body>
</html>
