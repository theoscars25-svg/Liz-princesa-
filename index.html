<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Liz Princesa 💛</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ff4da6, #ffcc00);
    text-align: center;
    color: white;
    overflow: hidden;
}

.heart {
    position: absolute;
    width: 15px;
    height: 15px;
    background: pink;
    transform: rotate(45deg);
    animation: float 6s infinite;
}
.heart::before, .heart::after {
    content: "";
    position: absolute;
    width: 15px;
    height: 15px;
    background: pink;
    border-radius: 50%;
}
.heart::before { top: -8px; }
.heart::after { left: -8px; }

@keyframes float {
    from { transform: translateY(100vh) rotate(45deg); }
    to { transform: translateY(-10vh) rotate(45deg); }
}

.mensaje {
    margin-top: 40vh;
    background: #25D366;
    padding: 15px;
    border-radius: 10px;
    display: inline-block;
    cursor: pointer;
}

.contenido {
    display: none;
    padding: 20px;
}

img {
    width: 250px;
    border-radius: 20px;
    margin-top: 15px;
}

.flor {
    font-size: 40px;
    animation: latido 1.5s infinite;
}

@keyframes latido {
    50% { transform: scale(1.2); }
}
</style>
</head>

<body>

<script>
for(let i=0;i<30;i++){
 let h=document.createElement("div");
 h.className="heart";
 h.style.left=Math.random()*100+"vw";
 h.style.animationDuration=(Math.random()*3+3)+"s";
 document.body.appendChild(h);
}
</script>

<div class="mensaje" onclick="mostrar()">
💌 Liz Princesa, tienes un mensaje (tócame)
</div>

<div class="contenido" id="contenido">
<div class="flor">🌻🌻🌻</div>

<h1>Para ti, mi Liz Princesa 💛</h1>

<img src="TU_FOTO_AQUI">

<p>
Hoy te regalo estas flores amarillas 🌻<br><br>
Porque tú iluminas mi vida como nadie más 💕<br><br>
Gracias por cada momento, cada sonrisa y cada beso ❤️<br><br>
Eres lo mejor que me ha pasado 💛<br><br>
Te amo muchísimo mi amor 😘
</p>

</div>

<script>
function mostrar(){
 document.querySelector(".mensaje").style.display="none";
 document.getElementById("contenido").style.display="block";
}
</script>

</body>
</html>
