<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Liz ❤️</title>

<style>

body{
margin:0;
padding:0;
background:#f2f2f2;
overflow:hidden;
font-family:Arial;
text-align:center;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

img{
width:260px;
border-radius:20px;
box-shadow:0 0 25px pink;
}

.mensaje{
margin-top:25px;
font-size:26px;
color:#c4004b;
font-weight:bold;
animation:aparecer 3s ease;
}

@keyframes aparecer{
0%{opacity:0;transform:translateY(30px)}
100%{opacity:1}
}

.flor{
position:absolute;
font-size:28px;
animation:caer 10s linear infinite;
}

@keyframes caer{
0%{transform:translateY(-100px)}
100%{transform:translateY(110vh)}
}

.corazon{
position:absolute;
font-size:24px;
animation:latir 1s infinite alternate;
}

@keyframes latir{
from{transform:scale(1)}
to{transform:scale(1.4)}
}

</style>
</head>

<body>

<div class="container">

<img src="https://i.postimg.cc/QtXTycc8/Whats-App-Image-2026-03-23-at-10-06-47.jpg">

<div class="mensaje">

🌻 Para Liz, mi princesa 🌻  
<br><br>
Hoy te regalo flores amarillas  
porque cada día contigo  
es como un rayo de sol en mi vida.  
<br><br>
Gracias por existir,  
por tu amor  
y por hacer mi mundo más bonito.  
<br><br>
❤️ Te amo ❤️

</div>

</div>

<div style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);">
<button onclick="playMusic()" 
style="padding:12px 20px;font-size:16px;border:none;border-radius:10px;background:#ff4d6d;color:white;cursor:pointer;">
🎵 Presiona aquí para escuchar la canción
</button>
</div>

<iframe id="music"
width="0"
height="0"
src=""
frameborder="0"
allow="autoplay">
</iframe>

<script>

function playMusic(){
document.getElementById("music").src=
"https://www.youtube.com/embed/mrXpa-6ZhBM?autoplay=1&loop=1&playlist=mrXpa-6ZhBM"
}

</script>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4a4cdd4c6e.mp3?filename=romantic-piano-11086.mp3">
</audio>

<script>

function crearFlor(){
const flor=document.createElement("div")
flor.className="flor"
flor.innerHTML="🌻"
flor.style.left=Math.random()*100+"vw"
flor.style.animationDuration=(Math.random()*5+5)+"s"
document.body.appendChild(flor)
setTimeout(()=>flor.remove(),10000)
}

setInterval(crearFlor,800)

function crearCorazon(){
const c=document.createElement("div")
c.className="corazon"
c.innerHTML="❤️"
c.style.left=Math.random()*100+"vw"
c.style.top=Math.random()*100+"vh"
document.body.appendChild(c)
setTimeout(()=>c.remove(),4000)
}

setInterval(crearCorazon,2000)

</script>

</body>
</html>
